# ─────────────────────────────────────────────────────────────────────────────
# notify-docs-on-release-note.yml
#
# INSTALL TARGET: snippyly/internal-release-notes/.github/workflows/
# (This copy lives in velt-js/docs only for review/version-control. Copy it
#  into the source repo's .github/workflows/ to activate.)
#
# On a new release-note file under release-notes/**, fires one
# repository_dispatch (type: new-release-note) per ADDED file to velt-js/docs,
# where release-note-to-docs-pr.yml runs the 7-agent pipeline and opens a PR.
#
# ROLLOUT: ships with the `push` trigger COMMENTED OUT. Use workflow_dispatch
# to test the dispatch plumbing first; uncomment `push` only after the plan's
# verification matrix (scenarios 1–5) is green.
#
# Requires repo secret: DOCS_DISPATCH_PAT — a PAT with `repo` scope on
# velt-js/docs (may reuse the same value as CROSS_REPO_PAT).
# ─────────────────────────────────────────────────────────────────────────────
name: notify-docs-on-release-note

on:
  # ── Enable this block only after validation (see ROLLOUT above) ──
  # push:
  #   branches: [main]
  #   paths:
  #     - 'release-notes/**'

  workflow_dispatch:
    inputs:
      path:
        description: "Force-dispatch a specific note path for testing, e.g. release-notes/v6.0.0-beta.2.md"
        required: false
        type: string

concurrency:
  group: rn2docs-notify-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Detect added notes & dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (need history to diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute added release notes
        id: added
        run: |
          set -euo pipefail
          MANUAL="${{ inputs.path }}"
          if [ -n "$MANUAL" ]; then
            # Manual test: dispatch exactly the provided path.
            printf '%s\n' "$MANUAL" > added.txt
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            # First push to a branch (all-zero before) → diff against empty tree.
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$(git hash-object -t tree /dev/null)"
            fi
            git diff --name-only --diff-filter=A "$BEFORE" "$AFTER" -- 'release-notes/**/*.md' > added.txt || true
          fi
          echo "Added release notes:"; cat added.txt || true
          COUNT=$(grep -c . added.txt || true)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Dispatch one event per added note
        if: steps.added.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.DOCS_DISPATCH_PAT }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Dispatching for $f"
            gh api repos/velt-js/docs/dispatches \
              -f event_type=new-release-note \
              -F "client_payload[path]=$f" \
              -F "client_payload[sha]=$AFTER_SHA"
          done < added.txt

      - name: No new notes
        if: steps.added.outputs.count == '0'
        run: echo "No newly-added release notes in this push — nothing to dispatch."
