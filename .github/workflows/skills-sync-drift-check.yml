name: skills-sync-drift-check

# Weekly hygiene check. Compares the docs feature tree against the mapping
# table in reference-artifacts/mapping.md and the skill inventory in
# agent-skills/skills/. Files (or updates) a rollup issue in agent-skills if
# drift is detected. Silent on green weeks.

on:
  schedule:
    - cron: '0 14 * * 1'   # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          path: docs

      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          repository: velt-js/agent-skills
          token: ${{ secrets.AGENT_SKILLS_PAT }}
          path: agent-skills
          fetch-depth: 1

      - name: Run drift check
        env:
          DOCS_DIR:   ${{ github.workspace }}/docs
          SKILLS_DIR: ${{ github.workspace }}/agent-skills/skills
        run: bash docs/scripts/skills-sync/drift-check.sh

      - name: Read summary
        id: summary
        run: |
          echo "has_drift=$(jq -r '.has_drift' outputs/drift-summary.json)" >> "$GITHUB_OUTPUT"
          echo "drift_docs_count=$(jq -r '.drift_docs_count' outputs/drift-summary.json)" >> "$GITHUB_OUTPUT"
          echo "dead_skills_count=$(jq -r '.dead_skills_count' outputs/drift-summary.json)" >> "$GITHUB_OUTPUT"

      - name: File or update drift issue
        if: steps.summary.outputs.has_drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.AGENT_SKILLS_PAT }}
        run: |
          ISSUE_TITLE="skills-sync drift detected: $(steps.summary.outputs.drift_docs_count) unmapped doc dir(s), $(steps.summary.outputs.dead_skills_count) orphan skill(s)"
          # Format title without inline step output (the above syntax wouldn't work in env-less shell)
          DRIFT_DOCS=${{ steps.summary.outputs.drift_docs_count }}
          DEAD=${{ steps.summary.outputs.dead_skills_count }}
          TITLE="skills-sync drift: ${DRIFT_DOCS} unmapped doc dir(s), ${DEAD} orphan skill(s)"

          BODY_FILE=outputs/drift-report.md
          # Append link back to this workflow run
          {
            cat "$BODY_FILE"
            echo ""
            echo "---"
            echo "<small>Filed by the skills-sync drift-check workflow ($([ "$GITHUB_RUN_ID" ] && echo "[run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"))</small>"
          } > /tmp/issue-body.md

          # If an open issue with the `skills-sync-drift` label exists, update it; otherwise create new.
          EXISTING=$(gh issue list --repo velt-js/agent-skills --state open --label skills-sync-drift --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo velt-js/agent-skills \
              --title "$TITLE" \
              --body-file /tmp/issue-body.md
            echo "Updated existing drift issue #$EXISTING"
          else
            gh issue create --repo velt-js/agent-skills \
              --title "$TITLE" \
              --body-file /tmp/issue-body.md \
              --label skills-sync-drift \
              --label skills-sync
            echo "Filed new drift issue"
          fi

      - name: Close drift issue if green
        if: steps.summary.outputs.has_drift == 'false'
        env:
          GH_TOKEN: ${{ secrets.AGENT_SKILLS_PAT }}
        run: |
          EXISTING=$(gh issue list --repo velt-js/agent-skills --state open --label skills-sync-drift --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --repo velt-js/agent-skills \
              --comment "Drift cleared as of $(date -u +%Y-%m-%dT%H:%M:%SZ). Closing automatically — the weekly check will reopen if drift returns."
            echo "Closed drift issue #$EXISTING (drift cleared)"
          else
            echo "No open drift issue; nothing to close"
          fi

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: |
            outputs/drift-report.md
            outputs/drift-summary.json
          retention-days: 90
